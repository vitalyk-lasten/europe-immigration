    <script>
    (function () {
      const DIRECTION = 'EU';
      const ACTIVE_KEY = 'ghl_active_reference_code_' + DIRECTION;
      const SUBMITTED_KEY = 'ghl_submitted_reference_code_' + DIRECTION;
      const PAGE_KEY = 'ghl_reference_page_' + DIRECTION;

      function getStorage(key) {
        try {
          return sessionStorage.getItem(key) || '';
        } catch (e) {
          return '';
        }
      }

      function removeStorage(key) {
        try {
          sessionStorage.removeItem(key);
        } catch (e) {}
      }

      function getCode() {
        return getStorage(SUBMITTED_KEY) || getStorage(ACTIVE_KEY) || '';
      }

      function buildWhatsAppLink(code) {
        const base = 'https://wa.me/33159580778?text=';
        const text =
          "Hi! I'd like to get more details about my immigration/residency inquiry for Europe.\n\nReference Code: " +
          code;
        return base + encodeURIComponent(text);
      }

      function setWhatsAppLink() {
        const code = getCode();
        if (!code) {
          console.log('Reference code not found');
          return;
        }

        const btn = document.querySelector('a[href^="https://wa.me/33159580778"]');
        if (!btn) {
          console.log('WhatsApp button not found');
          return;
        }

        btn.href = buildWhatsAppLink(code);
        console.log('WA button updated with code:', code);

        removeStorage(ACTIVE_KEY);
        removeStorage(SUBMITTED_KEY);
        removeStorage(PAGE_KEY);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setWhatsAppLink);
      } else {
        setWhatsAppLink();
      }
    })();
    </script>
